<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meet-BG App · app.meet-bg.com</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #111;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 16px 48px;
  -webkit-font-smoothing: antialiased;
}

/* ── Phone shell ── */
.phone-shell {
  width: 375px;
  height: 812px;
  background: #0D0D0D;
  border-radius: 50px;
  padding: 12px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.1),
    0 0 0 2px #1A1A1A,
    0 40px 120px rgba(0,0,0,0.8),
    inset 0 0 0 1px rgba(255,255,255,0.04);
  position: relative;
  flex-shrink: 0;
}
.phone-screen {
  width: 100%; height: 100%;
  background: #0D0D0D;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  display: flex; flex-direction: column;
}
.dynamic-island {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 90px; height: 28px;
  background: #000; border-radius: 99px; z-index: 200;
}

/* ── Status bar ── */
.status-bar {
  height: 48px; flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 0 22px 10px; z-index: 100; position: relative;
}
.status-time { font-size: 15px; font-weight: 600; color: white; letter-spacing: -0.02em; }
.status-icons { display: flex; align-items: center; gap: 6px; }

/* ── Content area ── */
.screen-content {
  flex: 1; overflow: hidden; position: relative;
  display: flex; flex-direction: column;
}
.scroll-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── Bottom tab bar ── */
.tab-bar {
  height: 80px; flex-shrink: 0;
  background: rgba(13,13,13,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: flex-start; justify-content: space-around;
  padding-top: 10px; position: relative; z-index: 150;
}
.tab-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; padding: 4px 12px;
  -webkit-tap-highlight-color: transparent;
}
.tab-icon { font-size: 22px; line-height: 1; position: relative; }
.tab-label { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.35); transition: color 0.15s; }
.tab-item.active .tab-label { color: #C9A24D; }
.tab-dot { width: 4px; height: 4px; border-radius: 50%; background: #C9A24D; margin-top: -2px; }
.tab-badge {
  position: absolute; top: -4px; right: -6px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #F47A20; color: white; font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid #0D0D0D;
}

/* ── Push notification ── */
.push-notif {
  position: absolute; top: 54px; left: 12px; right: 12px; z-index: 999;
  background: rgba(30,30,30,0.96);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 12px 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: flex; align-items: flex-start; gap: 10px;
  animation: slideDown 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.push-app-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: #1E1E1E; border: 1px solid rgba(201,162,77,0.3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.push-content { flex: 1; }
.push-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
.push-app-name { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.06em; }
.push-time { font-size: 11px; color: rgba(255,255,255,0.25); }
.push-title { font-size: 13px; font-weight: 600; color: white; margin-bottom: 2px; }
.push-body { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.4; }

/* ── Typography ── */
.screen-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: white; }
.screen-title em { color: #C9A24D; font-style: italic; }
.section-head { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 12px; }
.gold { color: #C9A24D; }
.muted { color: rgba(255,255,255,0.4); }

/* ── Home screen ── */
.home-header { padding: 8px 20px 16px; }
.home-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.home-greeting { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
.home-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; color: white; }
.notif-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,0.07); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  position: relative;
}
.notif-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; border-radius: 50%; background: #F47A20; border: 1.5px solid #0D0D0D; }

/* City switcher */
.city-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; margin-bottom: 20px; }
.city-scroll::-webkit-scrollbar { display: none; }
.city-chip {
  padding: 7px 16px; border-radius: 99px; white-space: nowrap; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: all 0.15s; flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5);
  background: transparent;
}
.city-chip.active { background: rgba(201,162,77,0.15); border-color: rgba(201,162,77,0.4); color: #C9A24D; }

/* Event cards in feed */
.event-feed-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px; overflow: hidden;
  margin: 0 20px 14px; cursor: pointer;
  transition: all 0.15s;
}
.event-feed-card:active { transform: scale(0.98); }
.efc-top {
  background: #1E1E1E;
  padding: 18px 18px 16px;
  position: relative; overflow: hidden;
}
.efc-top::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 0%, rgba(201,162,77,0.1) 0%, transparent 60%);
  pointer-events: none;
}
.efc-date { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #C9A24D; margin-bottom: 5px; }
.efc-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: white; line-height: 1.1; margin-bottom: 4px; }
.efc-venue { font-size: 12px; color: rgba(255,255,255,0.4); }
.efc-badges { position: absolute; top: 14px; right: 14px; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
.efc-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 99px;
}
.badge-low  { background: rgba(245,158,11,0.2); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
.badge-open { background: rgba(34,197,94,0.15); color: #22C55E; border: 1px solid rgba(34,197,94,0.25); }
.badge-full { background: rgba(239,68,68,0.15); color: #EF4444; border: 1px solid rgba(239,68,68,0.2); }
.efc-bottom { padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
.efc-avatars { display: flex; }
.sm-avatar {
  width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #0D0D0D;
  background: #C9A24D; color: #1E1E1E; font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; margin-left: -6px;
  font-family: 'Cormorant Garamond', serif;
}
.sm-avatar:first-child { margin-left: 0; }
.efc-price { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: white; }
.efc-rating { font-size: 12px; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 4px; }

/* ── Event Detail ── */
.detail-nav { height: 48px; display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; }
.back-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: none; cursor: pointer;
  color: white; font-size: 18px; display: flex; align-items: center; justify-content: center;
}
.detail-hero {
  background: #1A1714; padding: 16px 20px 20px;
  position: relative; overflow: hidden;
}
.detail-hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 200px 150px at 80% 0%, rgba(201,162,77,0.1) 0%, transparent 60%);
  pointer-events: none;
}
.detail-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #C9A24D; margin-bottom: 8px; }
.detail-name { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300; color: white; line-height: 1.1; margin-bottom: 6px; }
.detail-name em { color: #C9A24D; font-style: italic; }
.detail-venue { font-size: 13px; color: rgba(255,255,255,0.45); }

.detail-map {
  height: 150px; position: relative; overflow: hidden;
  background: #1A1714; flex-shrink: 0;
}
.detail-map iframe { width: 100%; height: 100%; border: none; display: block; filter: saturate(0.5) brightness(0.7); }
.map-pill {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  color: white; font-size: 11px; font-weight: 600;
  padding: 5px 12px; border-radius: 99px; border: 1px solid rgba(255,255,255,0.1);
  text-decoration: none; display: block;
}

.detail-stats {
  padding: 16px 20px;
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.stat-cell { text-align: center; }
.stat-val { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: white; }
.stat-val.gold { color: #C9A24D; }
.stat-lbl { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }

.detail-section { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.detail-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.detail-row:last-child { margin-bottom: 0; }
.detail-icon { width: 28px; height: 28px; border-radius: 6px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.detail-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 2px; }
.detail-val { font-size: 13px; font-weight: 500; color: white; }

/* Reviews */
.review-card { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
.review-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
.review-author { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); }
.review-stars { font-size: 11px; color: #F59E0B; }
.review-text { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; }

/* CTA footer */
.detail-cta {
  padding: 14px 20px 20px; background: rgba(13,13,13,0.98);
  backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.cta-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cta-price { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: white; }
.cta-price-note { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 1px; }
.cta-seats-left { font-size: 12px; font-weight: 600; color: #F59E0B; }
.btn-book {
  width: 100%; padding: 16px; background: #C9A24D; color: #1E1E1E;
  border: none; border-radius: 14px; font-family: 'Inter', sans-serif;
  font-size: 16px; font-weight: 700; cursor: pointer;
}
.btn-book:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: default; }

/* ── Stripe Checkout ── */
.checkout-header { padding: 16px 20px 12px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.checkout-body { padding: 0 20px; flex: 1; overflow-y: auto; scrollbar-width: none; }
.checkout-body::-webkit-scrollbar { display: none; }
.checkout-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 14px;
}
.checkout-event-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: white; margin-bottom: 3px; }
.checkout-event-sub { font-size: 12px; color: rgba(255,255,255,0.4); }
.checkout-amount { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 300; color: white; text-align: center; margin: 8px 0 4px; }
.checkout-amount-sub { font-size: 12px; color: rgba(255,255,255,0.3); text-align: center; margin-bottom: 20px; }
.field-group { margin-bottom: 14px; }
.field-lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 6px; }
.field-mock {
  background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 12px 14px;
  font-size: 14px; color: rgba(255,255,255,0.7);
  display: flex; align-items: center; justify-content: space-between;
}
.field-mock.focused { border-color: rgba(201,162,77,0.5); background: rgba(201,162,77,0.05); }
.card-icons { display: flex; gap: 6px; }
.card-icon { font-size: 18px; opacity: 0.5; }
.stripe-lock { display: flex; align-items: center; gap: 6px; justify-content: center; margin: 10px 0; font-size: 11px; color: rgba(255,255,255,0.25); }
.btn-pay {
  width: 100%; padding: 16px; background: #C9A24D; color: #1E1E1E;
  border: none; border-radius: 14px; font-family: 'Inter', sans-serif;
  font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-apple-pay {
  width: 100%; padding: 15px;
  background: white; color: #1E1E1E;
  border: none; border-radius: 14px;
  font-size: 16px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}

/* ── Explore / Map screen ── */
.explore-search { padding: 10px 20px 12px; }
.search-bar {
  background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 11px 14px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; color: rgba(255,255,255,0.5); cursor: pointer;
}
.explore-map { height: 260px; position: relative; flex-shrink: 0; }
.explore-map iframe { width: 100%; height: 100%; border: none; display: block; filter: saturate(0.5) brightness(0.7); }
.explore-results { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 14px 20px; }
.explore-results::-webkit-scrollbar { display: none; }
.explore-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
  cursor: pointer;
}
.explore-item:last-child { border-bottom: none; }
.explore-item-img {
  width: 56px; height: 56px; border-radius: 10px; flex-shrink: 0;
  background: rgba(255,255,255,0.06); overflow: hidden;
}
.explore-item-img img { width: 100%; height: 100%; object-fit: cover; }
.explore-item-name { font-size: 14px; font-weight: 600; color: white; margin-bottom: 3px; }
.explore-item-addr { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 5px; }
.explore-item-meta { display: flex; align-items: center; gap: 8px; }
.rating-pill { display: flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; color: #F59E0B; }
.review-count { font-size: 11px; color: rgba(255,255,255,0.3); }
.price-tag { font-size: 11px; color: rgba(255,255,255,0.3); }
.has-event-badge { background: rgba(201,162,77,0.15); color: #C9A24D; border: 1px solid rgba(201,162,77,0.25); border-radius: 99px; font-size: 9px; font-weight: 700; padding: 2px 8px; letter-spacing: 0.06em; text-transform: uppercase; }

/* ── Bookings ── */
.bookings-tabs { display: flex; gap: 4px; padding: 0 20px 14px; }
.btab {
  flex: 1; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; text-align: center; border: none; transition: all 0.15s;
}
.btab.active { background: rgba(201,162,77,0.15); color: #C9A24D; }
.btab:not(.active) { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); }

.booking-card {
  margin: 0 20px 12px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px; overflow: hidden; cursor: pointer;
}
.bcard-top { background: #1A1714; padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; }
.bcard-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; color: white; margin-bottom: 3px; }
.bcard-venue { font-size: 11px; color: rgba(255,255,255,0.4); }
.bcard-bottom { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
.bcard-date { font-size: 12px; color: rgba(255,255,255,0.5); }
.bcard-ref { font-size: 11px; color: rgba(255,255,255,0.25); font-family: monospace; }
.bcard-status-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
.bs-confirmed { background: rgba(34,197,94,0.1); color: #22C55E; border: 1px solid rgba(34,197,94,0.2); }
.bs-past { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.08); }
.bs-rated { background: rgba(201,162,77,0.1); color: #C9A24D; border: 1px solid rgba(201,162,77,0.2); }

/* ── Chat ── */
.chat-header { padding: 8px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }
.chat-group-name { font-size: 14px; font-weight: 600; color: white; }
.chat-group-sub { font-size: 11px; color: rgba(255,255,255,0.3); }
.chat-avatars { display: flex; margin-top: 6px; }
.chat-messages { flex: 1; overflow-y: auto; padding: 12px 16px; scrollbar-width: none; display: flex; flex-direction: column; gap: 10px; }
.chat-messages::-webkit-scrollbar { display: none; }
.msg-row { display: flex; align-items: flex-end; gap: 8px; }
.msg-row.mine { flex-direction: row-reverse; }
.msg-avatar { width: 26px; height: 26px; border-radius: 50%; background: #C9A24D; color: #1E1E1E; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Cormorant Garamond', serif; }
.msg-bubble { max-width: 68%; padding: 9px 12px; border-radius: 16px; }
.msg-bubble.other { background: rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
.msg-bubble.mine { background: #C9A24D; border-bottom-right-radius: 4px; }
.msg-sender { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4); margin-bottom: 3px; }
.msg-text { font-size: 13px; color: white; line-height: 1.4; }
.msg-bubble.mine .msg-text { color: #1E1E1E; }
.msg-time { font-size: 9px; color: rgba(255,255,255,0.2); margin-top: 3px; }
.chat-date-divider { text-align: center; font-size: 10px; color: rgba(255,255,255,0.2); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }

  );
}

// ── CHAT ─────────────────────────────────────────────────────────────────────
function ChatScreen() {
  const [msgs, setMsgs] = React.useState(CHAT_MESSAGES);
  const [input, setInput] = React.useState('');
  const bottomRef = React.useRef(null);
  function sendMsg() {
    if (!input.trim()) return;
    setMsgs(m => [...m, { id: Date.now(), sender:"Ти", initials:"ИП", text:input.trim(), mine:true, time:"сега" }]);
    setInput('');
  }
  React.useEffect(() => { bottomRef.current?.scrollIntoView(); }, [msgs]);
  return (
    <>
      <div className="chat-header">
        <div className="chat-group-name">Bulgarian Dinner at DOMO 🍷</div>
        <div className="chat-group-sub">Пет 25 Апр · 9 участника</div>
        <div className="chat-avatars">
          {['МК','ЕМ','СД','ГК','СА'].map((i,idx)=>(
            <div key={idx} className="sm-avatar" style={{background:['#C9A24D','#4A9EFF','#F47A20','#22C55E','#C9A24D'][idx],width:22,height:22,fontSize:8,marginLeft:idx?-5:0}}>{i}</div>
          ))}
          <span style={{fontSize:11,color:'rgba(255,255,255,0.3)',marginLeft:8,alignSelf:'center'}}>+4</span>
        </div>
      </div>
      <div className="chat-messages">
        <div className="chat-date-divider">Днес</div>
        {msgs.map(m => (
          <div key={m.id} className={`msg-row ${m.mine?'mine':''}`}>
            {!m.mine && <div className="msg-avatar" style={{background:m.initials==='МК'?'#C9A24D':m.initials==='ЕМ'?'#4A9EFF':m.initials==='ГК'?'#22C55E':'#F47A20'}}>{m.initials}</div>}
            <div>
              {!m.mine && <div className="msg-sender">{m.sender}</div>}
              <div className={`msg-bubble ${m.mine?'mine':'other'}`}>
                <div className="msg-text">{m.text}</div>
              </div>
              <div className="msg-time" style={{textAlign:m.mine?'right':'left'}}>{m.time}</div>
            </div>
          </div>
        ))}
        <div ref={bottomRef}/>
      </div>
      <div className="chat-input-row">
        <input className="chat-input" placeholder="Съобщение..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendMsg()}/>
        <button className="send-btn" onClick={sendMsg}>↑</button>
      </div>
    </>
  );
}

// ── PUSH NOTIFICATION ─────────────────────────────────────────────────────────
function PushNotification({ onDismiss }) {
  React.useEffect(() => { const t = setTimeout(onDismiss, 5000); return () => clearTimeout(t); }, []);
  return (
    <div className="push-notif" onClick={onDismiss}>
      <div className="push-app-icon"><Logo size={22}/></div>
      <div className="push-content">
        <div className="push-header">
          <span className="push-app-name">meet-bg</span>
          <span className="push-time">сега</span>
        </div>
        <div className="push-title">⚡ Само 2 места останаха!</div>
        <div className="push-body">Bulgarian Dinner at DOMO · Пет 25 Апр · 19:30</div>
      </div>
    </div>
  );
}

// ── TAB BAR ───────────────────────────────────────────────────────────────────
const TABS = [
  { id:'home',     icon:'🏠', label:'Начало' },
  { id:'explore',  icon:'🔍', label:'Explore' },
  { id:'bookings', icon:'🎟', label:'Моите' },
  { id:'chat',     icon:'💬', label:'Chat',  badge:3 },
  { id:'profile',  icon:'👤', label:'Профил' },
];

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = React.useState('home');
  const [screen, setScreen] = React.useState('feed');  // feed | detail | checkout | success
  const [selectedEvent, setSelectedEvent] = React.useState(null);
  const [city, setCity] = React.useState(CITIES[0]);
  const [showPush, setShowPush] = React.useState(false);

  function handleEventSelect(ev) {
    setSelectedEvent(ev); setScreen('detail');
  }
  function handleBook(ev) {
    setScreen('checkout');
  }
  function handleCheckoutSuccess() {
    setScreen('feed'); setTab('bookings');
  }
  function handleNotif() {
    setShowPush(true);
  }

  function renderContent() {
    if (tab === 'home') {
      if (screen === 'detail' && selectedEvent) return <EventDetail ev={selectedEvent} onBack={()=>setScreen('feed')} onBook={handleBook}/>;
      if (screen === 'checkout' && selectedEvent) return <CheckoutScreen ev={selectedEvent} onBack={()=>setScreen('detail')} onSuccess={handleCheckoutSuccess}/>;
      return <HomeScreen onEventSelect={handleEventSelect} onNotif={handleNotif} city={city} setCity={setCity}/>;
    }
    if (tab === 'explore')  return <ExploreScreen onEventSelect={ev=>{ setTab('home'); handleEventSelect(ev); }}/>;
    if (tab === 'bookings') return <BookingsScreen onEventSelect={ev=>{ setTab('home'); handleEventSelect(ev); }}/>;
    if (tab === 'chat')     return <ChatScreen/>;
    if (tab === 'profile')  return <ProfileScreen/>;
  }

  function switchTab(id) {
    setTab(id); setScreen('feed');
  }

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.14em',textTransform:'uppercase',color:'rgba(255,255,255,0.2)',marginBottom:5}}>app.meet-bg.com</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,color:'rgba(255,255,255,0.6)',fontWeight:400}}>Mobile App Prototype</div>
      </div>

      <div className="phone-shell">
        <div className="phone-screen">
          <div className="dynamic-island"/>
          <StatusBar/>

          {showPush && <PushNotification onDismiss={()=>setShowPush(false)}/>}

          <div className="screen-content">
            {renderContent()}
          </div>

          <div className="tab-bar">
            {TABS.map(t => (
              <div key={t.id} className={`tab-item ${tab===t.id?'active':''}`} onClick={()=>switchTab(t.id)}>
                <div className="tab-icon">
                  {t.icon}
                  {t.badge && <div className="tab-badge">{t.badge}</div>}
                </div>
                <div className="tab-label">{t.label}</div>
                {tab===t.id && <div className="tab-dot"/>}
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{fontSize:12,color:'rgba(255,255,255,0.2)',textAlign:'center',lineHeight:1.7}}>
        Кликни на вечеря → Резервирай → Checkout<br/>
        Bells button → Push notification demo
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
