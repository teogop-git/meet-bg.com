<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background:#F7F4EF; padding:20px 24px; font-family:var(--font-ui); }
.section { margin-bottom:20px; }
.label { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#9CA3AF; margin-bottom:10px; }
.tokens { display:flex; flex-wrap:wrap; gap:8px; }
/* Spacing */
.sp { display:flex; align-items:center; gap:8px; }
.sp-bar { background:#C9A24D; height:16px; border-radius:3px; }
.sp-label { font-size:11px; font-family:monospace; color:#6B7280; }
/* Radius */
.radii { display:flex; gap:10px; flex-wrap:wrap; }
.rad { background:white; border:2px solid #C9A24D; width:48px; height:48px; display:flex; align-items:center; justify-content:center; }
.rad-label { font-size:9px; color:#6B7280; text-align:center; margin-top:4px; }
.rad-wrap { text-align:center; }
/* Shadows */
.shadows { display:flex; gap:12px; flex-wrap:wrap; }
.shad { background:white; width:80px; height:60px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:10px; color:#6B7280; text-align:center; padding:4px; }
</style>
</head>
<body>
  <div class="section">
    <div class="label">Spacing Scale</div>
    <div class="tokens" style="flex-direction:column; gap:6px;">
      <div class="sp"><div class="sp-bar" style="width:4px"></div><div class="sp-label">space-1 · 4px</div></div>
      <div class="sp"><div class="sp-bar" style="width:8px"></div><div class="sp-label">space-2 · 8px</div></div>
      <div class="sp"><div class="sp-bar" style="width:12px"></div><div class="sp-label">space-3 · 12px</div></div>
      <div class="sp"><div class="sp-bar" style="width:16px"></div><div class="sp-label">space-4 · 16px</div></div>
      <div class="sp"><div class="sp-bar" style="width:24px"></div><div class="sp-label">space-6 · 24px</div></div>
      <div class="sp"><div class="sp-bar" style="width:32px"></div><div class="sp-label">space-8 · 32px</div></div>
      <div class="sp"><div class="sp-bar" style="width:48px"></div><div class="sp-label">space-12 · 48px</div></div>
      <div class="sp"><div class="sp-bar" style="width:64px"></div><div class="sp-label">space-16 · 64px</div></div>
    </div>
  </div>
  <div class="section">
    <div class="label">Border Radius</div>
    <div class="radii">
      <div class="rad-wrap"><div class="rad" style="border-radius:4px">sm</div><div class="rad-label">4px</div></div>
      <div class="rad-wrap"><div class="rad" style="border-radius:8px">md</div><div class="rad-label">8px</div></div>
      <div class="rad-wrap"><div class="rad" style="border-radius:12px">lg</div><div class="rad-label">12px</div></div>
      <div class="rad-wrap"><div class="rad" style="border-radius:16px">xl</div><div class="rad-label">16px</div></div>
      <div class="rad-wrap"><div class="rad" style="border-radius:9999px">full</div><div class="rad-label">pill</div></div>
    </div>
  </div>
  <div class="section" style="margin:0">
    <div class="label">Shadows</div>
    <div class="shadows">
      <div class="shad" style="box-shadow:0 1px 4px rgba(0,0,0,0.06)">shadow-sm</div>
      <div class="shad" style="box-shadow:0 2px 16px rgba(0,0,0,0.08)">shadow-md</div>
      <div class="shad" style="box-shadow:0 4px 32px rgba(0,0,0,0.12)">shadow-lg</div>
      <div class="shad" style="box-shadow:0 8px 48px rgba(0,0,0,0.18)">shadow-xl</div>
      <div class="shad" style="background:#1F1F1F;color:#6B7280;box-shadow:0 2px 12px rgba(0,0,0,0.4)">shadow-app</div>
      <div class="shad" style="box-shadow:0 0 0 2px #C9A24D">shadow-gold</div>
    </div>
  </div>
</body></html>
