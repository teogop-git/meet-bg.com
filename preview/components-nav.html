<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background:#F7F4EF; padding:20px; font-family:var(--font-ui); }
.label { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#9CA3AF; margin-bottom:8px; }

/* Marketing top bar */
.topbar { background:white; border-bottom:1px solid #EDE8E0; padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; border-radius:10px; margin-bottom:16px; }
.topbar-logo { display:flex; align-items:center; gap:10px; }
.logo-sym { width:28px; height:28px; }
.logo-word { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:500; color:#1E1E1E; letter-spacing:-0.01em; }
.topbar-nav { display:flex; gap:24px; }
.topbar-nav a { text-decoration:none; font-size:14px; color:#6B7280; font-weight:500; transition:color 200ms; }
.topbar-nav a:hover, .topbar-nav a.active { color:#1E1E1E; }
.topbar-nav a.active { border-bottom:2px solid #C9A24D; padding-bottom:2px; }
.topbar-cta { background:#C9A24D; color:#1E1E1E; padding:9px 20px; border-radius:7px; font-size:13px; font-weight:600; text-decoration:none; }

/* Dark top bar (marketing dark sections) */
.topbar-dark { background:#1E1E1E; border-bottom:1px solid #2B2B2B; }
.topbar-dark .logo-word { color:white; }
.topbar-dark .topbar-nav a { color:#9CA3AF; }
.topbar-dark .topbar-nav a.active { color:white; }

/* App bottom nav */
.phone-frame { background:#0D0D0D; border-radius:16px; overflow:hidden; width:320px; margin-bottom:16px; }
.phone-content { height:120px; display:flex; align-items:center; justify-content:center; color:#4B4B4B; font-size:13px; }
.bottom-nav { background:#1F1F1F; border-top:1px solid #333; padding:10px 0 20px; display:flex; justify-content:space-around; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1; }
.nav-icon { width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
.nav-icon svg { width:22px; height:22px; stroke:#6B7280; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
.nav-item.active .nav-icon svg { stroke:#F47A20; }
.nav-label { font-size:10px; color:#6B7280; font-weight:500; }
.nav-item.active .nav-label { color:#F47A20; }
.nav-dot { position:relative; }
.nav-dot::after { content:''; position:absolute; top:-2px; right:-2px; width:7px; height:7px; background:#EF4444; border-radius:50%; border:1.5px solid #1F1F1F; }
</style>
</head>
<body>
<div class="label">Marketing — Top Navigation (Light)</div>
<div class="topbar">
  <div class="topbar-logo">
    <img src="../assets/logo-symbol.svg" class="logo-sym">
    <span class="logo-word">meet-bg</span>
  </div>
  <div class="topbar-nav">
    <a href="#" class="active">Вечери</a>
    <a href="#">Как работи</a>
    <a href="#">За нас</a>
    <a href="#">UK</a>
    <a href="#">DE</a>
  </div>
  <a href="#" class="topbar-cta">Запиши се →</a>
</div>

<div class="label">Marketing — Top Navigation (Dark)</div>
<div class="topbar topbar-dark">
  <div class="topbar-logo">
    <img src="../assets/logo-symbol-white.svg" class="logo-sym">
    <span class="logo-word">meet-bg</span>
  </div>
  <div class="topbar-nav">
    <a href="#" class="active">Вечери</a>
    <a href="#">Как работи</a>
    <a href="#">За нас</a>
    <a href="#">UK</a>
    <a href="#">DE</a>
  </div>
  <a href="#" class="topbar-cta">Запиши се →</a>
</div>

<div class="label">App — Bottom Navigation (Dark)</div>
<div class="phone-frame">
  <div class="phone-content">Screen content area</div>
  <div class="bottom-nav">
    <div class="nav-item active">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div class="nav-label">Home</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
      <div class="nav-label">Explore</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <div class="nav-label">Events</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon nav-dot"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
      <div class="nav-label">Messages</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <div class="nav-label">Profile</div>
    </div>
  </div>
</div>
</body></html>
