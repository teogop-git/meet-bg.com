<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background:#F7F4EF; padding:24px; font-family:var(--font-ui); }
.row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.swatch { border-radius:8px; overflow:hidden; box-shadow:var(--shadow-sm); width:120px; }
.swatch-color { height:64px; }
.swatch-info { background:white; padding:8px; }
.swatch-name { font-size:11px; font-weight:600; color:#1E1E1E; }
.swatch-hex  { font-size:10px; color:#6B7280; font-family:monospace; }
.label { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#9CA3AF; margin-bottom:8px; }
</style>
</head>
<body>
<div class="label">Brand Colors</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#1E1E1E"></div><div class="swatch-info"><div class="swatch-name">Graphite Black</div><div class="swatch-hex">#1E1E1E</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#C9A24D"></div><div class="swatch-info"><div class="swatch-name">Warm Gold</div><div class="swatch-hex">#C9A24D</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#DDB96A"></div><div class="swatch-info"><div class="swatch-name">Gold Light</div><div class="swatch-hex">#DDB96A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#A8833A"></div><div class="swatch-info"><div class="swatch-name">Gold Dark</div><div class="swatch-hex">#A8833A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F7F4EF; border:1px solid #E5E7EB"></div><div class="swatch-info"><div class="swatch-name">Cream White</div><div class="swatch-hex">#F7F4EF</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#EDE8E0"></div><div class="swatch-info"><div class="swatch-name">Cream Dark</div><div class="swatch-hex">#EDE8E0</div></div></div>
</div>
<div class="label">App Accents</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#F47A20"></div><div class="swatch-info"><div class="swatch-name">App Orange</div><div class="swatch-hex">#F47A20</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F99150"></div><div class="swatch-info"><div class="swatch-name">Orange Light</div><div class="swatch-hex">#F99150</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#D4631A"></div><div class="swatch-info"><div class="swatch-name">Orange Dark</div><div class="swatch-hex">#D4631A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#0D1B2A"></div><div class="swatch-info"><div class="swatch-name">Navy</div><div class="swatch-hex">#0D1B2A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#4A9EFF"></div><div class="swatch-info"><div class="swatch-name">Verified Blue</div><div class="swatch-hex">#4A9EFF</div></div></div>
</div>
</body></html>
