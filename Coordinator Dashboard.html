<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meet-BG · Coordinator Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #C9A24D; --graphite: #1E1E1E; --cream: #F7F4EF;
  --border: #E5E7EB; --muted: #6B7280; --surface: #ffffff;
  --green: #22C55E; --orange: #F47A20; --red: #EF4444; --blue: #3B82F6;
  --sidebar-w: 220px;
}
body { font-family: 'Inter', sans-serif; background: #F3F1EC; color: var(--graphite); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

.layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--graphite); display: flex; flex-direction: column;
  overflow: hidden;
}
.sb-logo {
  padding: 20px 20px 16px; display: flex; align-items: center; gap: 9px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sb-wordmark { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; color: white; }
.sb-role { padding: 10px 20px; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.25); border-bottom: 1px solid rgba(255,255,255,0.07); }
.sb-nav { padding: 12px 10px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.sb-nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.5); transition: all 0.12s; border: none; background: none; width: 100%; text-align: left;
}
.sb-nav-item:hover { color: white; background: rgba(255,255,255,0.07); }
.sb-nav-item.active { color: white; background: rgba(201,162,77,0.18); }
.sb-nav-item .nav-icon { width: 16px; text-align: center; font-size: 14px; }
.sb-nav-badge { margin-left: auto; background: var(--orange); color: white; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 99px; }
.sb-user {
  padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; gap: 10px;
}
.sb-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gold); color: var(--graphite); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; flex-shrink: 0; }
.sb-user-name { font-size: 13px; font-weight: 600; color: white; }
.sb-user-city { font-size: 11px; color: rgba(255,255,255,0.35); }

/* ── MAIN ── */
.main { display: flex; flex-direction: column; overflow: hidden; }

/* Topbar */
.topbar {
  background: white; border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.topbar-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.btn-primary {
  background: var(--graphite); color: white; border: none; border-radius: 8px;
  padding: 8px 18px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.btn-primary:hover { background: #2B2B2B; }
.btn-outline {
  background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 8px;
  padding: 7px 16px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 24px 28px; }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.stat-card {
  background: white; border-radius: 12px; padding: 16px 20px;
  border: 1px solid var(--border);
}
.stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.stat-value { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 400; color: var(--graphite); line-height: 1; margin-bottom: 4px; }
.stat-value.gold { color: var(--gold); }
.stat-sub { font-size: 11px; color: var(--muted); }
.stat-sub .up { color: var(--green); font-weight: 600; }
.stat-sub .down { color: var(--red); font-weight: 600; }

/* Two-col */
.two-col { display: grid; grid-template-columns: 1fr 360px; gap: 20px; }

/* Section card */
.section-card { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
.section-card-head {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.section-card-title { font-size: 13px; font-weight: 600; }
.section-card-body { }

/* Attendees table */
.attendee-row {
  display: grid; grid-template-columns: 32px 1fr auto auto 80px;
  align-items: center; gap: 12px;
  padding: 10px 20px; border-bottom: 1px solid #F9F7F3;
  transition: background 0.1s;
}
.attendee-row:last-child { border-bottom: none; }
.attendee-row:hover { background: #FAFAF8; }
.att-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--graphite); font-family: 'Cormorant Garamond', serif; flex-shrink: 0; }
.att-name { font-size: 13px; font-weight: 500; }
.att-sub { font-size: 11px; color: var(--muted); }
.att-ref { font-size: 11px; color: var(--muted); font-family: monospace; }
.att-amount { font-size: 13px; font-weight: 600; text-align: right; }
.att-status { display: flex; justify-content: flex-end; }
.status-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 99px;
}
.status-confirmed { background: rgba(34,197,94,0.1); color: #16A34A; border: 1px solid rgba(34,197,94,0.2); }
.status-pending   { background: rgba(245,158,11,0.1); color: #D97706; border: 1px solid rgba(245,158,11,0.2); }
.status-cancelled { background: rgba(239,68,68,0.1);  color: #DC2626; border: 1px solid rgba(239,68,68,0.2); }

/* Event detail right col */
.event-detail-card {
  background: white; border-radius: 12px; border: 1px solid var(--border);
  overflow: hidden;
}
.edc-hero { background: var(--graphite); padding: 20px; }
.edc-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: white; margin-bottom: 4px; }
.edc-sub { font-size: 12px; color: rgba(255,255,255,0.4); }
.edc-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.edc-row { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; }
.edc-icon { width: 28px; height: 28px; background: #F3F1EC; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
.edc-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.edc-val { font-size: 13px; font-weight: 500; color: var(--graphite); }

/* Seat bar */
.seat-bar-wrap { padding: 0 20px 16px; }
.seat-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.seat-bar { height: 6px; background: #F0EDE8; border-radius: 99px; overflow: hidden; }
.seat-bar-fill { height: 100%; background: var(--gold); border-radius: 99px; transition: width 0.5s; }

/* Checklist */
.coordinator-checks { padding: 0 20px 16px; }
.check-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.check-row { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 6px 0; border-bottom: 1px solid #F9F7F3; }
.check-row:last-child { border-bottom: none; }
.check-box {
  width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--border); background: white; transition: all 0.12s;
}
.check-box.done { background: var(--green); border-color: var(--green); }
.check-box.done::after { content: '✓'; color: white; font-size: 9px; font-weight: 700; }
.check-text { color: var(--graphite); flex: 1; line-height: 1.4; }
.check-text.done-text { text-decoration: line-through; color: var(--muted); }

/* Action buttons in event card */
.edc-actions { padding: 0 20px 16px; display: flex; flex-direction: column; gap: 8px; }

/* Message box */
.msg-box { padding: 0 20px 16px; }
.msg-textarea {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: 'Inter', sans-serif; font-size: 12px; resize: none; outline: none;
  transition: border-color 0.15s; color: var(--graphite); background: #FAFAFA;
}
.msg-textarea:focus { border-color: var(--gold); background: white; }
.msg-send-btn {
  width: 100%; margin-top: 8px; padding: 9px; background: var(--graphite); color: white;
  border: none; border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.msg-send-btn:hover { background: #2B2B2B; }

/* Upcoming events mini list */
.upcoming-item {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.1s;
}
.upcoming-item:last-child { border-bottom: none; }
.upcoming-item:hover { background: #FAFAF8; }
.upcoming-item.active-ev { background: #FBF8F3; border-left: 3px solid var(--gold); }
.upev-date { width: 38px; text-align: center; flex-shrink: 0; }
.upev-day { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--graphite); line-height: 1; }
.upev-month { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.upev-info { flex: 1; min-width: 0; }
.upev-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.upev-sub { font-size: 11px; color: var(--muted); }
.upev-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 99px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel">

  { name: "Мария Василева",    city: "Варна",  ref: "MBG-0447-05", amount: "20 лв.", status: "confirmed", initials: "МВ", bg: "#22C55E" },

    </svg>
  );

  const cls = { confirmed:'status-confirmed', pending:'status-pending', cancelled:'status-cancelled' }[status];
  const lbl = label || { confirmed:'Потвърден', pending:'Изчаква', cancelled:'Отказан' }[status];
  return <span className={`status-badge ${cls}`}>{lbl}</span>;
}

  const [checks, setChecks] = React.useState([

    { id:5, text: "Пристигни 20 мин. преди началото", done: false },
  ]);
  const [msg, setMsg] = React.useState('');
  const [sent, setSent] = React.useState(false);

  const toggleCheck = (id) => {
    setChecks(cs => cs.map(c => c.id === id ? {...c, done: !c.done} : c));
  };

  const total = 12;
  const pct = Math.round((confirmed / total) * 100);

  return (
    <div className="layout">

          <span className="sb-wordmark">meet-bg</span>

        <div className="sb-user">
          <div className="sb-avatar">МК</div>
          <div>

          <div className="topbar-actions">

        </div>

        <div className="content">
          {/* Stats */}

              <div className="stat-sub">от {total} места</div>

            <div className="stat-card">

              <div className="stat-sub">лв. тази вечеря</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Рейтинг</div>
              <div className="stat-value gold">4.8</div>

            <div className="stat-card">

            </div>
          </div>

          <div className="two-col">
            {/* Attendees */}
            <div style={{display:'flex', flexDirection:'column', gap:20}}>
              <div className="section-card">
                <div className="section-card-head">

                  <div className="seat-bar-label">
                    <span>Запълване</span>
                    <span style={{fontWeight:600, color:'#1E1E1E'}}>{pct}%</span>
                  </div>
                  <div className="seat-bar">
                    <div className="seat-bar-fill" style={{width: `${pct}%`}}/>
                  </div>
                </div>

                {/* Checklist */}
                <div className="coordinator-checks">
                  <div className="check-title">Координаторски чеклист</div>
                  {checks.map(c => (
                    <div key={c.id} className="check-row" onClick={() => toggleCheck(c.id)} style={{cursor:'pointer'}}>
                      <div className={`check-box ${c.done ? 'done' : ''}`}/>
                      <span className={`check-text ${c.done ? 'done-text' : ''}`}>{c.text}</span>
                    </div>
                  ))}
                </div>

                {/* Actions */}
                <div className="edc-actions">
                  <button className="btn-primary" style={{width:'100%', padding:10}}>Изпрати напомняне до всички</button>
                  <button className="btn-outline" style={{width:'100%', padding:9}}>Отвори в Google Maps ↗</button>
                </div>

                {/* Quick message */}
                <div className="msg-box">
                  <textarea
                    className="msg-textarea" rows={3}
                    placeholder="Съобщение до участниците..."
                    value={msg}
                    onChange={e => { setMsg(e.target.value); setSent(false); }}
                  />
                  <button className="msg-send-btn" onClick={() => { setSent(true); setMsg(''); }}>
                    {sent ? '✓ Изпратено!' : 'Изпрати съобщение'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
