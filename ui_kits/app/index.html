<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#111; font-family:'Inter',-apple-system,sans-serif; display:flex; justify-content:center; align-items:flex-start; padding:40px 20px; gap:32px; flex-wrap:wrap; min-height:100vh; }
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

.phone { width:375px; height:812px; background:#0D0D0D; border-radius:40px; overflow:hidden; position:relative; border:1px solid #222; flex-shrink:0; display:flex; flex-direction:column; }
.screen { flex:1; overflow:hidden; display:flex; flex-direction:column; }
.screen-label { position:absolute; top:-24px; left:0; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#4B4B4B; }

/* Status bar */
.status-bar { display:flex; justify-content:space-between; align-items:center; padding:12px 20px 6px; flex-shrink:0; }
.status-time { font-size:15px; font-weight:600; color:white; }
.status-icons { display:flex; gap:6px; align-items:center; }
.status-icons span { font-size:12px; color:white; }

/* Scrollable content */
.scroll-area { flex:1; overflow-y:auto; scrollbar-width:none; }
.scroll-area::-webkit-scrollbar { display:none; }

/* Bottom nav */
.bottom-nav { background:#1A1A1A; border-top:1px solid #2A2A2A; padding:8px 0 20px; display:flex; justify-content:space-around; flex-shrink:0; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; flex:1; padding:2px 0; }
.nav-item svg { width:22px; height:22px; stroke:#555; fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; transition:stroke 150ms; }
.nav-item.active svg { stroke:#F47A20; }
.nav-label { font-size:10px; color:#555; font-weight:500; transition:color 150ms; }
.nav-item.active .nav-label { color:#F47A20; }
.nav-badge { position:relative; }
.nav-badge::after { content:'2'; position:absolute; top:-6px; right:-8px; background:#EF4444; color:white; font-size:9px; font-weight:700; width:15px; height:15px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:1.5px solid #1A1A1A; }

/* ── HOME SCREEN ── */
.home-header { padding:16px 20px 8px; display:flex; justify-content:space-between; align-items:center; }
.home-greeting { }
.greet-sub { font-size:12px; color:#666; font-weight:500; }
.greet-main { font-size:22px; font-weight:700; color:white; line-height:1.2; }
.greet-main span { color:#F47A20; }
.header-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#F47A20,#D4631A); display:flex; align-items:center; justify-content:center; font-weight:700; color:white; font-size:14px; border:2px solid #2A2A2A; }

/* City pill row */
.city-row { display:flex; gap:8px; padding:8px 20px 0; overflow-x:auto; scrollbar-width:none; }
.city-row::-webkit-scrollbar { display:none; }
.city-pill { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border-radius:99px; font-size:13px; font-weight:500; white-space:nowrap; cursor:pointer; border:1px solid #2A2A2A; color:#888; background:#1A1A1A; transition:all 150ms; }
.city-pill.active { background:#F47A20; color:white; border-color:#F47A20; }

/* Section header */
.sec-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px 8px; }
.sec-title { font-size:16px; font-weight:700; color:white; }
.sec-see-all { font-size:13px; color:#F47A20; font-weight:500; cursor:pointer; }

/* Event cards horizontal */
.events-row { display:flex; gap:12px; padding:0 20px 8px; overflow-x:auto; scrollbar-width:none; }
.events-row::-webkit-scrollbar { display:none; }
.ev-card { background:#1A1A1A; border-radius:14px; overflow:hidden; width:220px; flex-shrink:0; cursor:pointer; border:1px solid #222; }
.ev-card-img { height:110px; display:flex; align-items:flex-end; padding:10px 12px; position:relative; }
.ev-img-sofia  { background:linear-gradient(160deg,#1E1E1E,#2B2B2B); }
.ev-img-london { background:linear-gradient(160deg,#0D1B2A,#1A2535); }
.ev-img-chicago{ background:linear-gradient(160deg,#1A1020,#251A35); }
.ev-card-tag { background:rgba(244,122,32,0.9); color:white; font-size:10px; font-weight:700; padding:3px 8px; border-radius:99px; }
.ev-card-body { padding:12px 14px; }
.ev-card-date { font-size:11px; color:#F47A20; font-weight:600; letter-spacing:0.05em; margin-bottom:3px; }
.ev-card-name { font-size:14px; font-weight:600; color:white; margin-bottom:6px; line-height:1.3; }
.ev-card-foot { display:flex; justify-content:space-between; align-items:center; }
.ev-card-loc { font-size:11px; color:#666; }
.ev-card-price { font-size:13px; font-weight:700; color:white; }

/* People near you */
.people-row { display:flex; gap:12px; padding:0 20px 8px; overflow-x:auto; scrollbar-width:none; }
.people-row::-webkit-scrollbar { display:none; }
.person-card { background:#1A1A1A; border-radius:14px; padding:14px; width:150px; flex-shrink:0; border:1px solid #222; }
.person-avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; color:white; margin-bottom:10px; }
.person-name { font-size:13px; font-weight:600; color:white; margin-bottom:2px; display:flex; align-items:center; gap:4px; }
.person-verified { color:#4A9EFF; font-size:11px; }
.person-loc { font-size:11px; color:#666; margin-bottom:8px; }
.person-tags { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:10px; }
.person-tag { background:#222; color:#888; font-size:10px; padding:2px 7px; border-radius:99px; }
.person-follow { width:100%; padding:7px; background:#F47A20; border:none; border-radius:7px; color:white; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
.person-follow.following { background:#222; color:#F47A20; border:1px solid #F47A20; }

/* ── EXPLORE SCREEN ── */
.explore-header { padding:16px 20px 12px; }
.explore-title { font-size:24px; font-weight:700; color:white; margin-bottom:12px; }
.search-box { display:flex; align-items:center; gap:10px; background:#1A1A1A; border-radius:10px; padding:10px 14px; border:1px solid #2A2A2A; }
.search-box svg { width:16px; height:16px; stroke:#666; flex-shrink:0; }
.search-box span { font-size:14px; color:#555; }
.filter-row { display:flex; gap:8px; padding:8px 20px 0; overflow-x:auto; scrollbar-width:none; }
.filter-pill { display:inline-flex; align-items:center; padding:6px 14px; border-radius:99px; font-size:12px; font-weight:600; white-space:nowrap; cursor:pointer; border:1px solid #2A2A2A; color:#888; background:transparent; }
.filter-pill.active { background:#F47A20; color:white; border-color:#F47A20; }

/* People grid */
.people-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 20px; }
.pgrid-card { background:#1A1A1A; border-radius:12px; padding:14px; border:1px solid #222; }
.pgrid-avatar { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; color:white; margin-bottom:8px; }
.pgrid-name { font-size:13px; font-weight:600; color:white; margin-bottom:2px; display:flex; align-items:center; gap:4px; }
.pgrid-loc { font-size:11px; color:#666; margin-bottom:8px; }
.pgrid-tags { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:8px; }
.pgrid-tag { background:#222; color:#888; font-size:10px; padding:2px 6px; border-radius:99px; }
.pgrid-follow { width:100%; padding:6px; background:#F47A20; border:none; border-radius:6px; color:white; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; }
.pgrid-follow.following { background:transparent; color:#F47A20; border:1px solid #F47A20; }
.pgrid-dinners { font-size:10px; color:#555; margin-top:4px; }

/* ── EVENTS SCREEN ── */
.ev-list { display:flex; flex-direction:column; gap:0; padding:0 20px; }
.ev-list-item { display:flex; gap:14px; padding:16px 0; border-bottom:1px solid #1A1A1A; cursor:pointer; }
.ev-list-img { width:72px; height:72px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:22px; }
.ev-list-sofia  { background:linear-gradient(135deg,#1E1E1E,#333); }
.ev-list-london { background:linear-gradient(135deg,#0D1B2A,#1A2535); }
.ev-list-munich { background:linear-gradient(135deg,#1A1020,#2A1830); }
.ev-list-berlin { background:linear-gradient(135deg,#0F1F0F,#1A2E1A); }
.ev-list-body { flex:1; }
.ev-list-date { font-size:11px; color:#F47A20; font-weight:600; letter-spacing:0.05em; margin-bottom:2px; }
.ev-list-name { font-size:14px; font-weight:600; color:white; margin-bottom:4px; line-height:1.3; }
.ev-list-meta { display:flex; gap:10px; align-items:center; }
.ev-list-loc { font-size:12px; color:#666; }
.ev-list-price { font-size:12px; font-weight:600; color:white; }
.ev-list-seats { font-size:11px; padding:2px 8px; border-radius:99px; font-weight:600; }
.sl-ok  { background:#1A2E1A; color:#4ADE80; }
.sl-low { background:#2E2008; color:#FCD34D; }
.sl-full{ background:#2E0808; color:#F87171; }

/* ── PROFILE SCREEN ── */
.profile-header { padding:20px 20px 0; }
.profile-cover { height:100px; background:linear-gradient(160deg,#0D1B2A,#1A0A05); border-radius:14px; position:relative; margin-bottom:0; }
.profile-avatar-wrap { padding:0 20px; margin-top:-28px; position:relative; z-index:2; display:flex; justify-content:space-between; align-items:flex-end; }
.profile-avatar { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,#F47A20,#D4631A); display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:700; color:white; border:3px solid #0D0D0D; }
.profile-edit-btn { background:#1A1A1A; border:1px solid #333; color:white; padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
.profile-info { padding:10px 20px 0; }
.profile-name { font-size:20px; font-weight:700; color:white; display:flex; align-items:center; gap:6px; margin-bottom:2px; }
.profile-verified { color:#4A9EFF; font-size:14px; }
.profile-loc { font-size:13px; color:#888; margin-bottom:10px; }
.profile-bio { font-size:13px; color:#aaa; line-height:1.5; margin-bottom:14px; }
.profile-stats { display:flex; gap:0; border-top:1px solid #1A1A1A; border-bottom:1px solid #1A1A1A; }
.pstat { flex:1; padding:12px 0; text-align:center; border-right:1px solid #1A1A1A; }
.pstat:last-child { border-right:none; }
.pstat-num { font-size:18px; font-weight:700; color:white; }
.pstat-label { font-size:10px; color:#555; text-transform:uppercase; letter-spacing:0.06em; margin-top:1px; }
.profile-tags { display:flex; flex-wrap:wrap; gap:6px; padding:14px 20px 0; }
.ptag { background:#1A1A1A; color:#888; font-size:12px; padding:5px 12px; border-radius:99px; border:1px solid #2A2A2A; }
.ptag.active { background:rgba(244,122,32,0.15); color:#F47A20; border-color:rgba(244,122,32,0.3); }
.profile-sec { padding:16px 20px 0; }
.profile-sec-title { font-size:13px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#555; margin-bottom:10px; }
.dinner-history { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:4px; }
.dinner-chip { background:#1A1A1A; border-radius:10px; padding:10px 14px; flex-shrink:0; border:1px solid #222; }
.dinner-chip-date { font-size:10px; color:#F47A20; font-weight:600; }
.dinner-chip-name { font-size:12px; color:white; font-weight:500; margin-top:2px; }
.dinner-chip-loc { font-size:10px; color:#555; }

/* ── MESSAGES ── */
.msg-list { padding:8px 20px; display:flex; flex-direction:column; gap:0; }
.msg-item { display:flex; gap:12px; padding:14px 0; border-bottom:1px solid #1A1A1A; cursor:pointer; align-items:center; }
.msg-avatar { width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; color:white; flex-shrink:0; position:relative; }
.msg-online::after { content:''; position:absolute; bottom:1px; right:1px; width:11px; height:11px; background:#22C55E; border-radius:50%; border:2px solid #0D0D0D; }
.msg-body { flex:1; min-width:0; }
.msg-name-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
.msg-name { font-size:14px; font-weight:600; color:white; }
.msg-time { font-size:11px; color:#555; }
.msg-preview { font-size:13px; color:#666; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.msg-preview.unread { color:#aaa; font-weight:500; }
.unread-dot { width:8px; height:8px; background:#F47A20; border-radius:50%; flex-shrink:0; }
</style>
</head>

<script type="text/babel">

const { useState } = React;

const SVG = {
  home: <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  explore: <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  events: <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  messages: <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
  profile: <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
};

const StatusBar = () => (
  <div className="status-bar">
    <span className="status-time">9:41</span>
    <div className="status-icons">
      <span>●●●</span><span>WiFi</span><span>🔋</span>
    </div>
  </div>
);

const BottomNav = ({ active, setActive }) => (
  <div className="bottom-nav">
    {[
      {id:'home', label:'Home', icon:SVG.home},
      {id:'explore', label:'Explore', icon:SVG.explore},
      {id:'events', label:'Events', icon:SVG.events},
      {id:'messages', label:'Messages', icon:SVG.messages, badge:true},
      {id:'profile', label:'Profile', icon:SVG.profile},
    ].map(t => (
      <div key={t.id} className={`nav-item${active===t.id?' active':''}`} onClick={()=>setActive(t.id)}>
        <div className={t.badge ? 'nav-badge' : ''}>{t.icon}</div>
        <div className="nav-label">{t.label}</div>
      </div>
    ))}
  </div>
);

// ── HOME SCREEN ──
const HomeScreen = () => {
  const [city, setCity] = useState('London');
  const cities = ['All','Sofia','London','Munich','Berlin','Chicago'];
  const [followed, setFollowed] = useState({});

  const events = [
    {id:1, cls:'ev-img-london', tag:'🇬🇧 UK', date:'SAT 26 APR · 20:00', name:'BG Dinner — Shoreditch', loc:'London', price:'£18'},
    {id:2, cls:'ev-img-sofia',  tag:'🇧🇬 BG', date:'FRI 25 APR · 19:30', name:'Bulgarska Vecher', loc:'Sofia', price:'20 лв.'},
    {id:3, cls:'ev-img-chicago', tag:'🇺🇸 US', date:'SAT 3 MAY · 19:00', name:'BG Night Chicago', loc:'Chicago', price:'$18'},
  ];
  const people = [
    {id:1, init:'IP', bg:'linear-gradient(135deg,#F47A20,#D4631A)', name:'Ivan P.', verified:true, loc:'London · 7 🍷', tags:['Tech','Wine']},
    {id:2, init:'EG', bg:'linear-gradient(135deg,#C9A24D,#A8833A)', name:'Elena G.', verified:true, loc:'London · 4 🍷', tags:['Art','Food']},
    {id:3, init:'MD', bg:'linear-gradient(135deg,#4A9EFF,#0D1B2A)', name:'Maria D.', verified:false, loc:'London · 2 🍷', tags:['Travel']},
  ];

  return (
    <div className="scroll-area">
      <div className="home-header">
        <div className="home-greeting">
          <div className="greet-sub">Good evening</div>
          <div className="greet-main">Discover <span>Bulgarians</span></div>
        </div>
        <div className="header-avatar">TP</div>
      </div>

      <div className="city-row">
        {cities.map(c => (
          <div key={c} className={`city-pill${city===c?' active':''}`} onClick={()=>setCity(c)}>{c}</div>
        ))}
      </div>

      <div className="sec-header"><span className="sec-title">Upcoming Dinners</span><span className="sec-see-all">See all</span></div>
      <div className="events-row">
        {events.map(ev => (
          <div key={ev.id} className="ev-card">
            <div className={`ev-card-img ${ev.cls}`}><span className="ev-card-tag">{ev.tag}</span></div>
            <div className="ev-card-body">
              <div className="ev-card-date">{ev.date}</div>
              <div className="ev-card-name">{ev.name}</div>
              <div className="ev-card-foot">
                <span className="ev-card-loc">📍 {ev.loc}</span>
                <span className="ev-card-price">{ev.price}</span>
              </div>
            </div>
          </div>
        ))}
      </div>

      <div className="sec-header"><span className="sec-title">Bulgarians near you</span><span className="sec-see-all">See all</span></div>
      <div className="people-row">
        {people.map(p => (
          <div key={p.id} className="person-card">
            <div className="person-avatar" style={{background:p.bg}}>{p.init}</div>
            <div className="person-name">{p.name}{p.verified && <span className="person-verified">✓</span>}</div>
            <div className="person-loc">{p.loc}</div>
            <div className="person-tags">{p.tags.map(t=><span key={t} className="person-tag">{t}</span>)}</div>
            <button className={`person-follow${followed[p.id]?' following':''}`} onClick={()=>setFollowed(f=>({...f,[p.id]:!f[p.id]}))}>

          </div>
        ))}
      </div>

      <div className="sec-header" style={{paddingTop:8}}><span className="sec-title">Trending worldwide</span><span className="sec-see-all">See all</span></div>
      <div style={{padding:'0 20px 24px', display:'flex', gap:10, flexWrap:'wrap'}}>
        {[{city:'🇩🇪 Munich',n:14},{city:'🇬🇧 Manchester',n:9},{city:'🇺🇸 New York',n:6},{city:'🇪🇸 Madrid',n:4}].map(x=>(
          <div key={x.city} style={{background:'#1A1A1A',borderRadius:10,padding:'10px 14px',border:'1px solid #222',cursor:'pointer'}}>
            <div style={{fontSize:13,color:'white',fontWeight:600}}>{x.city}</div>
            <div style={{fontSize:11,color:'#666',marginTop:2}}>{x.n} active this week</div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── EXPLORE SCREEN ──
const ExploreScreen = () => {
  const [filter, setFilter] = useState('All');
  const filters = ['All','UK','Germany','USA','Bulgaria','New Members'];
  const [followed, setFollowed] = useState({3:true});
  const people = [
    {id:1,init:'IP',bg:'linear-gradient(135deg,#F47A20,#D4631A)',name:'Ivan Petrov',verified:true,loc:'London, UK',tags:['Tech','Wine'],dinners:7},
    {id:2,init:'EG',bg:'linear-gradient(135deg,#C9A24D,#A8833A)',name:'Elena G.',verified:true,loc:'Munich, DE',tags:['Art','Food'],dinners:4},
    {id:3,init:'SD',bg:'linear-gradient(135deg,#4A9EFF,#0D1B2A)',name:'Stoyan D.',verified:true,loc:'Chicago, US',tags:['Business'],dinners:2},
    {id:4,init:'MK',bg:'linear-gradient(135deg,#22C55E,#166534)',name:'Maria K.',verified:false,loc:'Berlin, DE',tags:['Music','Travel'],dinners:1},
    {id:5,init:'ND',bg:'linear-gradient(135deg,#A855F7,#7C3AED)',name:'Niki D.',verified:true,loc:'London, UK',tags:['Fitness','Wine'],dinners:9},
    {id:6,init:'BP',bg:'linear-gradient(135deg,#EF4444,#991B1B)',name:'Boris P.',verified:false,loc:'Sofia, BG',tags:['Tech'],dinners:3},
  ];
  return (
    <div className="scroll-area">
      <div className="explore-header">
        <div className="explore-title">Explore</div>
        <div className="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span>Search Bulgarians worldwide...</span>
        </div>
      </div>
      <div className="filter-row">
        {filters.map(f=><div key={f} className={`filter-pill${filter===f?' active':''}`} onClick={()=>setFilter(f)}>{f}</div>)}
      </div>
      <div className="people-grid">
        {people.map(p=>(
          <div key={p.id} className="pgrid-card">
            <div className="pgrid-avatar" style={{background:p.bg}}>{p.init}</div>
            <div className="pgrid-name">{p.name.split(' ')[0]}{p.verified && <span style={{color:'#4A9EFF',fontSize:11}}>✓</span>}</div>
            <div className="pgrid-loc">{p.loc}</div>
            <div className="pgrid-tags">{p.tags.map(t=><span key={t} className="pgrid-tag">{t}</span>)}</div>
            <button className={`pgrid-follow${followed[p.id]?' following':''}`} onClick={()=>setFollowed(f=>({...f,[p.id]:!f[p.id]}))}>
              {followed[p.id]?'Following ✓':'Follow'}
            </button>
            <div className="pgrid-dinners">🍷 {p.dinners} dinners</div>
          </div>
        ))}
      </div>
    </div>
  );
};

const App = () => {

  const screens = { home:<HomeScreen/>, explore:<ExploreScreen/>, events:<EventsScreen/>, messages:<MessagesScreen/>, profile:<ProfileScreen/> };

  return (
    <div>
      <div style={{position:'absolute',top:-24,left:0,fontSize:11,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'#4B4B4B'}}>

      <div className="phone">
        <div className="screen">
          <StatusBar/>
          {screens[screen]}
          <BottomNav active={screen} setActive={setScreenPersist}/>

      </div>
    </div>
  );
};
